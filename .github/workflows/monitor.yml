name: Monitor Radar de Cursos

on:
  schedule:
    - cron: '12 12,15,0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitorar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Rodar scraper
        run: python scraper.py
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          DEBUG: "false"

      - name: Salvar estado atualizado
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "Atualizar estado dos cursos"
          git push
